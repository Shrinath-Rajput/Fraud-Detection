<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraud Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }
        .card {
            border-radius: 15px;
        }
        .form-control {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center mb-4 text-dark">💳 Fraud Detection System</h2>

        <form action="/predict" method="post">

            <div class="row">
                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="Time" class="form-control" placeholder="Time" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="V1" class="form-control" placeholder="V1" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="V2" class="form-control" placeholder="V2" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="V3" class="form-control" placeholder="V3" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="V4" class="form-control" placeholder="V4" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="V5" class="form-control" placeholder="V5" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="V6" class="form-control" placeholder="V6" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="V7" class="form-control" placeholder="V7" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="V8" class="form-control" placeholder="V8" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" step="any" name="Amount" class="form-control" placeholder="Amount" required>
                </div>
            </div>

            <div class="text-center">
                <button class="btn btn-dark px-5">Predict</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
