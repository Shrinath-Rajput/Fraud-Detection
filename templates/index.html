<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-5 shadow">

        <h2 class="text-center mb-4">Fraud Detection System</h2>

        <!-- 🔥 FORM START -->
        <form action="/predict" method="post">

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label>Time</label>
                    <input type="number" step="any" name="Time" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Amount</label>
                    <input type="number" step="any" name="Amount" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V1</label>
                    <input type="number" step="any" name="V1" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V2</label>
                    <input type="number" step="any" name="V2" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V3</label>
                    <input type="number" step="any" name="V3" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V4</label>
                    <input type="number" step="any" name="V4" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V5</label>
                    <input type="number" step="any" name="V5" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V6</label>
                    <input type="number" step="any" name="V6" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V7</label>
                    <input type="number" step="any" name="V7" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V8</label>
                    <input type="number" step="any" name="V8" class="form-control" required>
                </div>

            </div>

            <!-- 🔥 BUTTON -->
            <button type="submit" class="btn btn-primary w-100 mt-3">
                Test Prediction
            </button>

        </form>
        <!-- 🔥 FORM END -->

    </div>
</div>

</body>
</html>
