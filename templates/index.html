<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">💳 Fraud Detection System</h2>

        <form action="/predict" method="post">

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label>Time</label>
                    <input type="number" step="any" class="form-control" name="Time" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V1</label>
                    <input type="number" step="any" class="form-control" name="V1" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V2</label>
                    <input type="number" step="any" class="form-control" name="V2" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V3</label>
                    <input type="number" step="any" class="form-control" name="V3" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V4</label>
                    <input type="number" step="any" class="form-control" name="V4" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V5</label>
                    <input type="number" step="any" class="form-control" name="V5" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V6</label>
                    <input type="number" step="any" class="form-control" name="V6" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V7</label>
                    <input type="number" step="any" class="form-control" name="V7" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>V8</label>
                    <input type="number" step="any" class="form-control" name="V8" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Amount</label>
                    <input type="number" step="any" class="form-control" name="Amount" required>
                </div>

            </div>

            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary px-5">
                    🚀 Predict
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
